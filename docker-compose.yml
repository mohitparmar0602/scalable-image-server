version: '3.8'
services:
  app1:
    build: .
    env_file: .env
    environment:
      - PORT=3000

  app2:
    build: .
    env_file: .env
    environment:
      - PORT=3000

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2