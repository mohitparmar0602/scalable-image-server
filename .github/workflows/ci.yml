name: Scalable Image Server CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# This silences the GitHub Actions deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Updated to modern Node versions to fix the warning
        node-version: [22.x, 24.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run basic lint checks
      run: node --check server.js

    - name: Build and run the project
      # Provide dummy AWS keys just for the CI test so the server doesn't crash!
      env:
        AWS_REGION: ap-south-1
        AWS_ACCESS_KEY_ID: dummy-key-for-ci
        AWS_SECRET_ACCESS_KEY: dummy-secret-for-ci
        AWS_S3_BUCKET_NAME: dummy-bucket
      run: |
        PORT=3000 node server.js &
        SERVER_PID=$!
        sleep 2
        if ps -p $SERVER_PID > /dev/null
        then
           echo "Server successfully started and is running."
           kill $SERVER_PID
        else
           echo "Server failed to start."
           exit 1
        fi